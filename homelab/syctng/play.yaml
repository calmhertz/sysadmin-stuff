apiVersion: v1
kind: Pod
metadata:
  name: syncthing
spec:
  containers:
  - name: main
    image: lscr.io/linuxserver/syncthing:latest
    hostname: syncthing
    env:
    - name: PUID
      value: "1000"
    - name: PGID
      value: "1000"
    ports:
    - containerPort: 8384
      hostPort: 8384
    - containerPort: 22000
      hostPort: 22000
      protocol: TCP
    - containerPort: 22000
      hostPort: 22000
      protocol: UDP
    - containerPort: 21027
      hostPort: 21027
      protocol: UDP

    volumeMounts:
    - name: config
      mountPath: /config:Z
    - name: sync
      mountPath: /sync:Z
    - name: stuff
      mountPath: /stuff:Z
    - name: chombeshwara
      mountPath: /chombeshwara:Z
    - name: stts
      mountPath: /stts:Z

  volumes:
  - name: config
    hostPath:
      path: /home/user/syncthing/config
      type: DirectoryOrCreate
  - name: sync
    hostPath:
      path: /home/user/syncthing/data/sync
      type: DirectoryOrCreate
  - name: stuff
    hostPath:
      path: /home/user/syncthing/data/stuff
      type: DirectoryOrCreate
  - name: chombeshwara
    hostPath:
      path: /home/user/syncthing/data/chombeshwara
      type: DirectoryOrCreate
  - name: stts
    hostPath:
      path: /home/user/syncthing/data/stts
      type: DirectoryOrCreate

